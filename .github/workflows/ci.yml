name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: aether
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: aether
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U aether"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio

      - name: Run tests
        env:
          DATABASE_URL: postgresql://aether:test_password@localhost:5432/aether
          AETHER_JWT_SECRET: test_secret_for_ci_only
          ENVIRONMENT: development
        run: |
          cd backend
          python -m pytest tests/ -v --tb=short

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: backend-tests
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: aether
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: aether
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U aether"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://aether:test_password@localhost:5432/aether
      AETHER_JWT_SECRET: test_secret_for_ci_only
      ENVIRONMENT: development
      PORT: 8000
      QUOTA_FREE_LIMIT: 50

    steps:
      - uses: actions/checkout@v4

      - name: Verify environment variables
        run: |
          echo "DATABASE_URL=${DATABASE_URL}"
          echo "AETHER_JWT_SECRET=${AETHER_JWT_SECRET}"

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Install Playwright browsers (Python)
        run: |
          cd backend
          python -m playwright install chromium --with-deps

      - name: Wait for PostgreSQL
        run: |
          echo "Waiting for PostgreSQL to be ready..."
          for i in $(seq 1 30); do
            if pg_isready -h localhost -p 5432 -U aether > /dev/null 2>&1; then
              echo "PostgreSQL is ready!"
              break
            fi
            echo "Attempt $i/30..."
            sleep 2
          done

      - name: Start backend server
        run: |
          cd backend
          DATABASE_URL="postgresql://aether:test_password@localhost:5432/aether" \
          AETHER_JWT_SECRET="test_secret_for_ci_only" \
          ENVIRONMENT="development" \
          PORT=8000 \
          python -m uvicorn app.api.main:app --host 0.0.0.0 --port 8000 &
          echo "Waiting for backend to start..."
          for i in $(seq 1 30); do
            if curl -s http://localhost:8000/health > /dev/null 2>&1; then
              echo "Backend is ready!"
              break
            fi
            echo "Attempt $i/30..."
            sleep 2
          done
          curl -s http://localhost:8000/health || echo "WARNING: Backend health check failed"

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Install Playwright browsers (Node)
        run: |
          cd frontend
          npx playwright install --with-deps chromium

      - name: Start frontend dev server
        run: |
          cd frontend
          VITE_API_URL="http://localhost:8000" npm run dev &
          echo "Waiting for frontend to start..."
          for i in $(seq 1 30); do
            if curl -s http://localhost:5173 > /dev/null 2>&1; then
              echo "Frontend is ready!"
              break
            fi
            echo "Attempt $i/30..."
            sleep 2
          done
          curl -s http://localhost:5173 > /dev/null || echo "WARNING: Frontend check failed"

      - name: Run E2E tests
        env:
          VITE_API_URL: http://localhost:8000
          PLAYWRIGHT_BASE_URL: http://localhost:5173
        run: |
          cd frontend
          npx playwright test --reporter=list

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/test-results/
          retention-days: 7

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Run ESLint
        run: |
          cd frontend
          npm run lint
