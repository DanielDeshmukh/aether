name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  nextjs:
    name: Next.js Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: aether/package-lock.json

      - name: Install dependencies
        working-directory: aether
        run: npm ci

      - name: Build
        working-directory: aether
        run: npx next build

  python:
    name: Python Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: aether_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/aether_test
      AETHER_JWT_SECRET: test-secret-key-for-ci
      NVIDIA_API_KEY: ""
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: aether/backend/requirements.txt

      - name: Install dependencies
        working-directory: aether/backend
        run: pip install -r requirements.txt

      - name: Run tests
        working-directory: aether/backend
        run: python -m pytest tests/ -v --tb=short

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: aether/package-lock.json

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: aether/backend/requirements.txt

      - name: Install JS dependencies
        working-directory: aether
        run: npm ci

      - name: Install Python dependencies
        working-directory: aether/backend
        run: pip install ruff

      - name: Lint Python
        working-directory: aether/backend
        run: ruff check app/
