services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: aether
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  worker:
    build:
      context: .
      dockerfile: worker/Dockerfile
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/aether
      NVIDIA_API_KEY: ${NVIDIA_API_KEY}
      AETHER_USE_NVIDIA_ORCHESTRATOR: "true"
      AETHER_JWT_SECRET: ${AETHER_JWT_SECRET}
      WORKER_PORT: "4000"
    depends_on:
      - postgres
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile.app
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/aether
      NVIDIA_API_KEY: ${NVIDIA_API_KEY}
      AETHER_JWT_SECRET: ${AETHER_JWT_SECRET}
      AETHER_USE_NVIDIA_ORCHESTRATOR: "true"
      FRONTEND_URL: http://localhost:3000
      WORKER_URL: http://worker:4000
      RESEND_API_KEY: ${RESEND_API_KEY}
      EMAIL_FROM: ${EMAIL_FROM}
    depends_on:
      - postgres
      - worker
    restart: unless-stopped

volumes:
  pgdata:
