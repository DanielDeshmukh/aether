# fly.toml - AETHER Backend on Fly.io
# Deploy: fly deploy
# Secrets: fly secrets set AETHER_JWT_SECRET=... FRONTEND_URL=... ENVIRONMENT=production
# Postgres: fly postgres create → set DATABASE_URL as secret

app = 'aether-backend'
primary_region = 'iad'

[build]
  dockerfile = 'backend/Dockerfile'

[env]
  PORT = '8000'
  WEB_CONCURRENCY = '2'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = 'connections'
    hard_limit = 50
    soft_limit = 25

[[http_service.checks]]
  grace_period = '10s'
  interval = '15s'
  method = 'GET'
  timeout = '5s'
  path = '/health'

[deploy]
  release_command = 'alembic upgrade head'
